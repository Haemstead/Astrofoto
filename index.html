<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Foto Galerij</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<h1>Mijn Foto Galerij</h1>

<div class="gallery">
<img src="maan.jpg" onclick="openImg(this)">
<img src="M45-nabewerkt.jpeg" onclick="openImg(this)">
<img src="M101.jpg" onclick="openImg(this)">
<img src="M42.jpg" onclick="openImg(this)">
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightbox-img">
</div>

<script>
function openImg(img){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
